workspace = 1, monitor:$mon1
workspace = 2, monitor:$mon1
workspace = 3, monitor:$mon1
workspace = 4, monitor:$mon1
workspace = 5, monitor:$mon1
workspace = 6, monitor:$mon1
workspace = 7, monitor:$mon2
workspace = 8, monitor:$mon2
workspace = name:VM, monitor:$mon2

# Hyprland 0.53+ overhauled window rules:
#  - `windowrulev2` is removed; everything is now `windowrule`.
#  - Matchers use `match:class <regex>`, `match:title <regex>`,
#    `match:xwayland 0|1`, `match:floating 0|1`, `match:fullscreen 0|1`,
#    `match:pinned 0|1`.
#  - Action params that used to be implicit booleans now need explicit values:
#       noblur      -> no_blur on
#       nofocus     -> no_focus on
#       noanim      -> no_anim on
#       bordersize  -> border_size <n>
#       stayfocused -> stay_focused on
#  - `suppressevent` was renamed to `suppress_event` and is most reliably set
#    via a named rule block.

windowrule = workspace 2, match:class chromium
#windowrule = workspace 2, match:class thorium-browser
windowrule = workspace 7, match:class spotify
windowrule = workspace 7, match:class discord
windowrule = workspace 7, match:class feishin
windowrule = minsize 10, match:class discord
windowrule = workspace 3 silent, match:class steam
windowrule = workspace 5, match:class gamescope
windowrule = workspace 5, match:class .*steam_app.*
windowrule = tile, match:class .*steam_app.*
windowrule = border_size 0, match:class .*steam_app.*
windowrule = fullscreen, match:class .*steam_app.*
workspace = name:VM, on-created-empty: ~/scripts/bootvm.sh

#windowrule = float, match:class steam
#windowrule = float, match:class steam, match:title Friends List
#windowrule = tile, match:class steam
windowrule = float, match:class org.pulseaudio.pavucontrol
windowrule = float, match:class (clipse)
windowrule = size 622 652, match:class (clipse)
windowrule = size 800 700, match:class org.pulseaudio.pavucontrol
windowrule = float, match:class exiled-exchange-2
windowrule = no_blur on, match:class exiled-exchange-2
windowrule = no_focus on, match:class exiled-exchange-2
windowrule = no_anim on, match:class exiled-exchange-2
windowrule = workspace 5, match:title (Steam Big Picture Mode)
#workspace = 7, layoutopt:wslayout-layout:master
windowrule = float, match:title (Project Diablo 2 Launcher)
windowrule = workspace 4, match:title (Project Diablo 2 Launcher)

# Block all windows from sending maximize events (replaces the old
# `windowrulev2 = suppressevent maximize, class:.*`).
windowrule {
    name = no_maximize
    suppress_event = maximize
    match:class = .*
}

# Fix some dragging issues with XWayland (replaces the old
# `windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0`).
windowrule {
    name = xwayland_drag_fix
    no_focus = on
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:floating = 1
    match:fullscreen = 0
    match:pinned = 0
}
