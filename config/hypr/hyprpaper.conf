# hyprpaper 0.8.0+ syntax: wallpaper is set via anonymous `wallpaper { }` blocks.
# The old `preload = ...` / `wallpaper = ,...` shorthand was removed in the
# hyprtoolkit rewrite that ships with Hyprland 0.53.

wallpaper {
    # Empty monitor = fallback for all monitors
    monitor =
    path = ~/Pictures/wp5.png
    fit_mode = cover   # cover | contain | stretch | tile
}
